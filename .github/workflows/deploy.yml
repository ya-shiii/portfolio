name: Deploy Static Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Nuxt build files
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/nuxt
          key: nuxt-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: nuxt-cache-

      - name: Build static files
        run: |
          npx nuxt prepare
          npm run generate
        env:
          NUXT_APP_BASE_URL: /portfolio/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
